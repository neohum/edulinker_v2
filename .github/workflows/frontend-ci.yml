name: Frontend CI

on:
  push:
    branches: [main]
    paths: ['web_service/**']
  pull_request:
    branches: [main]
    paths: ['web_service/**']

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_service/package-lock.json
      - name: Install dependencies
        working-directory: web_service
        run: npm ci
      - name: Run ESLint
        working-directory: web_service
        run: npx eslint . --max-warnings=0

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_service/package-lock.json
      - name: Install dependencies
        working-directory: web_service
        run: npm ci
      - name: TypeScript check
        working-directory: web_service
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_service/package-lock.json
      - name: Install dependencies
        working-directory: web_service
        run: npm ci
      - name: Build
        working-directory: web_service
        run: npm run build
