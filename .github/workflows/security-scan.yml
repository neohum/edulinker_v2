name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am

jobs:
  go-security:
    name: Go Security (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        working-directory: backend
        run: gosec -severity medium -fmt json -out gosec-report.json ./... || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: backend/gosec-report.json

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: web_service
        run: npm ci
      - name: NPM Audit
        working-directory: web_service
        run: npm audit --audit-level=high || true

  trivy:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scanning
        working-directory: backend
        run: docker build -t edulinker-api:scan .
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'edulinker-api:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()
