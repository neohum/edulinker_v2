version: "3.9"

services:
  # ─── PostgreSQL 16 ───
  postgres:
    image: postgres:16-alpine
    container_name: edulinker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edulinker
      POSTGRES_USER: edulinker
      POSTGRES_PASSWORD: edulinker
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edulinker"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ───
  redis:
    image: redis:7-alpine
    container_name: edulinker-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible, 교내 파일 저장) ───
  minio:
    image: minio/minio:latest
    container_name: edulinker-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
  minio_data:
